name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: ['main']
    tags: ['v*']

permissions:
  contents: write

env:
  FLUTTER_CHANNEL: stable
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-linux:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libblkid-dev liblzma-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package
        run: |
          cd build/linux/x64/release/bundle
          tar czf "$GITHUB_WORKSPACE/sitzplan-linux.tar.gz" .
      - uses: actions/upload-artifact@v5
        with:
          name: sitzplan-linux
          path: sitzplan-linux.tar.gz

  build-windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath sitzplan-windows.zip -Force
      - uses: actions/upload-artifact@v5
        with:
          name: sitzplan-windows
          path: sitzplan-windows.zip

  build-macos:
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package
        run: |
          APP_PATH="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No macOS .app bundle found" >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$GITHUB_WORKSPACE/sitzplan-macos.zip"
      - uses: actions/upload-artifact@v5
        with:
          name: sitzplan-macos
          path: sitzplan-macos.zip

  build-ios:
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign
      - name: Package unsigned app
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "No iOS Runner.app bundle found" >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$GITHUB_WORKSPACE/sitzplan-ios-unsigned.zip"
      - uses: actions/upload-artifact@v5
        with:
          name: sitzplan-ios-unsigned
          path: sitzplan-ios-unsigned.zip

  build-android:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk sitzplan-android.apk
      - uses: actions/upload-artifact@v5
        with:
          name: sitzplan-android
          path: sitzplan-android.apk

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-windows, build-macos, build-ios, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            sitzplan-linux.tar.gz
            sitzplan-windows.zip
            sitzplan-macos.zip
            sitzplan-ios-unsigned.zip
            sitzplan-android.apk
