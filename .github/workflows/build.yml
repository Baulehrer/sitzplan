name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: ['main']
    tags: ['v*']

permissions:
  contents: write

env:
  FLUTTER_CHANNEL: stable
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_VERSION: 1.0.1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-linux:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libblkid-dev liblzma-dev
      - run: flutter pub get
      - run: flutter build linux --release --build-name "$APP_VERSION" --build-number "${GITHUB_RUN_NUMBER}"
      - name: Build AppImage
        run: packaging/linux/build_appimage.sh
      - uses: actions/upload-artifact@v5
        with:
          name: sitzplan-linux-appimage
          path: dist/Sitzplan-${{ env.APP_VERSION }}-x86_64.AppImage

  build-windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release --build-name "${{ env.APP_VERSION }}" --build-number "${{ github.run_number }}"
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\windows\sitzplan.iss'
      - uses: actions/upload-artifact@v5
        with:
          name: sitzplan-windows-installer
          path: dist/Sitzplan-${{ env.APP_VERSION }}-Setup.exe

  build-macos:
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release --build-name "$APP_VERSION" --build-number "${GITHUB_RUN_NUMBER}"
      - name: Build DMG
        run: packaging/macos/create_dmg.sh
      - uses: actions/upload-artifact@v5
        with:
          name: sitzplan-macos-dmg
          path: dist/Sitzplan-${{ env.APP_VERSION }}-macos.dmg

  build-ios:
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign
      - name: Package unsigned app
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "No iOS Runner.app bundle found" >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$GITHUB_WORKSPACE/sitzplan-ios-unsigned.zip"
      - uses: actions/upload-artifact@v5
        with:
          name: sitzplan-ios-unsigned
          path: sitzplan-ios-unsigned.zip

  build-android:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk sitzplan-android.apk
      - uses: actions/upload-artifact@v5
        with:
          name: sitzplan-android
          path: sitzplan-android.apk

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-windows, build-macos, build-ios, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            Sitzplan-${{ env.APP_VERSION }}-x86_64.AppImage
            Sitzplan-${{ env.APP_VERSION }}-Setup.exe
            Sitzplan-${{ env.APP_VERSION }}-macos.dmg
            sitzplan-ios-unsigned.zip
            sitzplan-android.apk
